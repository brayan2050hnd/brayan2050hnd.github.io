name: Actualizador de Canales

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install cloudscraper playwright
          playwright install chromium --with-deps
          pip install requests

      - name: Crear archivos HTML por defecto (si no existen)
        run: |
          for f in choluvision.html telemundo_florida.html usa.html disney.html; do
            if [ ! -f "$f" ]; then
              echo '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="background:#000;"></body></html>' > "$f"
            fi
          done
          # Para universal_kids.html, usar el video de referencia XAYgvRwSFKA
          if [ ! -f universal_kids.html ]; then
            cat > universal_kids.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>UNIVERSAL KIDS</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
                  iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
              </style>
          </head>
          <body>
              <iframe src="https://www.youtube.com/embed/XAYgvRwSFKA?autoplay=1&rel=0&modestbranding=1&playsinline=1"
                      allow="autoplay; encrypted-media"
                      allowfullscreen>
              </iframe>
          </body>
          </html>
          EOF
          fi

      - name: Ejecutar script
        run: python cazador.py

      - name: Subir cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mexico.json usa.json honduras.json choluvision.html telemundo_florida.html usa.html disney.html universal_kids.html
          git commit -m "Actualización automática de link" || exit 0
          git push origin main
