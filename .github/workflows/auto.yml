name: Actualizador de Canales

on:
  schedule:
    - cron: '0 */1 * * *' # Lo puse cada hora para que el token no expire
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Playwright y dependencias
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Ejecutar script
        run: python cazador.py

      - name: Subir cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mexico.json usa.json
          git commit -m "Link actualizado por el sniffer" || exit 0
          git push origin main
