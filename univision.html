<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIVISION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="player" src="https://www.youtube-nocookie.com/embed/YxgnqBSZ5lw?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1"
            allow="autoplay; encrypted-media"
            allowfullscreen>
    </iframe>
    <script>
        setTimeout(() => {
            const iframe = document.getElementById('player');
            if (iframe) {
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            }
        }, 3000);

        setInterval(() => {
            try {
                const iframe = document.getElementById('player');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"skipVideoAd","args":""}', '*');
                    const adElements = iframe.contentDocument.querySelectorAll('.ytp-ad-module, .ytp-ad-image-overlay, .ytp-ad-player-overlay');
                    adElements.forEach(el => el.remove());
                }
            } catch (e) {}
        }, 1000);
    </script>
</body>
</html>
