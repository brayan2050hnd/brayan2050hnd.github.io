<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cargando UNIVISION...</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <h2>Conectando al servidor...</h2>

    <script>
        // En lugar de usar un iframe que protege a los anuncios de tu app,
        // usamos "replace" para mandar a tu WebView directamente al sitio.
        // Como usamos "replace", no se guarda en el historial y el botón de retroceso 
        // de tu teléfono funcionará perfectamente para salir del canal.
        
        setTimeout(function() {
            window.location.replace("https://telefullhd.net/canales/univision/");
        }, 500); // Medio segundo de espera para que tu app asimile el cambio
    </script>
</body>
</html>
