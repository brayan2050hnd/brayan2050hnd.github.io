<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIVISION</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}

/* ══ IFRAME ══ */
#stream{
  position:fixed;inset:0;width:100%;height:100%;border:none;
  opacity:0;pointer-events:none;transition:opacity .5s ease;
}
#stream.on{opacity:1;pointer-events:all}

/* ══ SHIELDS — cubren TODAS las zonas de anuncios ══ */
.sh{position:fixed;z-index:9;background:transparent;pointer-events:all}
#sh-top    {top:0;left:0;right:0;height:28%}          /* banner superior */
#sh-mid-l  {top:28%;left:0;width:20%;height:44%}      /* lateral izq */
#sh-mid-r  {top:28%;right:0;width:20%;height:44%}     /* lateral der */
#sh-bot    {bottom:0;left:0;right:0;height:30%}       /* regalo/inferior */
/* ventana central para el video — NO hay shield aquí */

/* ══ PANTALLA DE INICIO ══ */
#splash{
  position:fixed;inset:0;z-index:100;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  cursor:pointer;
  transition:opacity .6s ease, transform .6s ease;
}
#splash.gone{opacity:0;transform:scale(1.04);pointer-events:none}

/* Fondo con gradiente animado */
.bg-gfx{
  position:absolute;inset:0;overflow:hidden;
}
.bg-gfx::before{
  content:'';position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(228,20,43,.18) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:breathe 3s ease-in-out infinite;
}
.bg-gfx::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(180,0,30,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(228,20,43,.06) 0%, transparent 50%);
}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}

/* Logo */
.logo-ring{
  position:relative;width:110px;height:110px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:22px;
}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(228,20,43,.35);
  animation:spin 8s linear infinite;
}
.ring::before{
  content:'';position:absolute;top:-3px;left:50%;
  width:6px;height:6px;border-radius:50%;
  background:#e4142b;transform:translateX(-50%);
}
.ring2{
  position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  animation:spin 5s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-inner{
  width:78px;height:78px;border-radius:50%;
  background:linear-gradient(145deg,#c8000f,#7a0009);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 32px rgba(228,20,43,.4);
}
.logo-inner svg{width:40px;height:40px}

.brand{
  color:#fff;font-size:22px;font-weight:300;
  letter-spacing:10px;text-transform:uppercase;
  margin-bottom:6px;
}
.brand span{font-weight:700;color:#fff}

.tagline{
  display:flex;align-items:center;gap:8px;
  color:rgba(255,255,255,.35);font-size:11px;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:52px;
}
.dot{width:5px;height:5px;background:#e4142b;border-radius:50%;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* Botón de play grande */
.play-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:72px;height:72px;
}
.play-ring-anim{
  position:absolute;inset:-10px;border-radius:50%;
  border:1.5px solid rgba(228,20,43,.4);
  animation:ripple 2s ease-in-out infinite;
}
.play-ring-anim2{
  position:absolute;inset:-22px;border-radius:50%;
  border:1px solid rgba(228,20,43,.2);
  animation:ripple 2s ease-in-out .6s infinite;
}
@keyframes ripple{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.2);opacity:0}}
.play-btn{
  width:72px;height:72px;border-radius:50%;
  background:rgba(228,20,43,.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(228,20,43,.5);
  transition:transform .15s,box-shadow .15s;
}
#splash:active .play-btn{transform:scale(.92);box-shadow:0 2px 12px rgba(228,20,43,.4)}
.play-btn svg{width:28px;height:28px;margin-left:4px}

.start-hint{
  margin-top:24px;color:rgba(255,255,255,.28);font-size:12px;letter-spacing:1.5px;
}

/* Nota sobre autoplay */
.notice{
  position:absolute;bottom:28px;
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:8px 16px;
  color:rgba(255,255,255,.3);font-size:11px;letter-spacing:.5px;
}

/* ══ SPINNER de carga ══ */
#loader{
  position:fixed;inset:0;z-index:8;
  display:flex;align-items:center;justify-content:center;
  background:#000;opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#loader.show{opacity:1}
.sp{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(255,255,255,.08);
  border-top-color:#e4142b;
  animation:spin .8s linear infinite;
}

/* ══ FAB FS ══ */
#fab{
  position:fixed;bottom:20px;right:16px;z-index:20;
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:18px;
  display:none;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
}
#fab.show{display:flex}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:30;padding:9px 20px;border-radius:24px;
  background:rgba(15,15,15,.85);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);font-size:12px;letter-spacing:.5px;
  display:none;align-items:center;gap:8px;
  backdrop-filter:blur(12px);
  animation:slideUp .4s ease;
}
#toast.show{display:flex}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
</style>
</head>
<body>

<!-- IFRAME -->
<iframe id="stream"
  src="https://telefullhd.net/canales/univision/?autoplay=1"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen
  sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation"
  referrerpolicy="no-referrer"
></iframe>

<!-- SHIELDS anti-anuncios -->
<div class="sh" id="sh-top"></div>
<div class="sh" id="sh-mid-l"></div>
<div class="sh" id="sh-mid-r"></div>
<div class="sh" id="sh-bot"></div>

<!-- LOADER -->
<div id="loader"><div class="sp"></div></div>

<!-- FAB pantalla completa -->
<div id="fab" onclick="goFS()" title="Pantalla completa">⛶</div>

<!-- TOAST -->
<div id="toast">🔊 Reproduciendo con sonido</div>

<!-- PANTALLA DE INICIO -->
<div id="splash" onclick="launch()">
  <div class="bg-gfx"></div>

  <div class="logo-ring">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="logo-inner">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M8 10v16q0 10 12 10t12-10V10h-7v16q0 5-5 5t-5-5V10Z" fill="white"/>
      </svg>
    </div>
  </div>

  <div class="brand"><span>Univision</span></div>
  <div class="tagline"><span class="dot"></span>Transmisión en vivo<span class="dot"></span></div>

  <div class="play-wrap">
    <div class="play-ring-anim"></div>
    <div class="play-ring-anim2"></div>
    <div class="play-btn">
      <svg viewBox="0 0 24 24" fill="white"><path d="M6 4l15 8-15 8z"/></svg>
    </div>
  </div>
  <p class="start-hint">TOCA PARA INICIAR</p>

  <div class="notice">
    ⚡ Los navegadores requieren un toque para activar el sonido
  </div>
</div>

<script>
(function(){
  const stream = document.getElementById('stream');
  const splash = document.getElementById('splash');
  const loader = document.getElementById('loader');
  const fab    = document.getElementById('fab');
  const toast  = document.getElementById('toast');
  let launched = false;

  /* ── Intentar autoplay silencioso en segundo plano desde el inicio ── */
  /* (algunos navegadores móviles lo permiten si no hay sonido) */
  window.addEventListener('load', function(){
    stream.classList.add('on');
    // Enviar mensajes al player para que arranque
    tryPlay();
  });

  /* ── LAUNCH: el usuario toca una vez → todo arranca ── */
  window.launch = function(){
    if(launched) return;
    launched = true;

    splash.classList.add('gone');
    loader.classList.add('show');

    // 1. Pantalla completa INMEDIATA (requiere el gesto del usuario)
    goFS();

    // 2. Forzar play + sonido vía postMessage
    tryPlay();
    setTimeout(tryPlay, 1000);
    setTimeout(tryPlay, 2500);

    // 3. Simular clic en botón FS interno del player
    [1500, 3000, 5000].forEach(t => setTimeout(clickFSBtn, t));

    // 4. Ocultar loader
    stream.addEventListener('load', hideLdr, {once:true});
    setTimeout(hideLdr, 5000);

    // 5. Toast
    setTimeout(()=>{
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 3000);
    }, 1200);
  };

  function hideLdr(){
    loader.classList.remove('show');
  }

  /* ── Pantalla completa ── */
  window.goFS = function(){
    try{
      const el = document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen).call(el);
    }catch(e){}
  };

  /* ── postMessages para play + unmute ── */
  function tryPlay(){
    try{
      const cw = stream.contentWindow;
      // JW Player
      cw.postMessage({method:'play'}, '*');
      cw.postMessage({method:'setMute',value:false}, '*');
      cw.postMessage({method:'setVolume',value:100}, '*');
      // HTML5 generic
      cw.postMessage({action:'play'}, '*');
      cw.postMessage({action:'unmute'}, '*');
      cw.postMessage('play', '*');
      // Plyr / Video.js
      cw.postMessage({type:'play'}, '*');
      cw.postMessage({type:'unmute'}, '*');
    }catch(e){}
  }

  /* ── Simular clic en botón FS interno (esquina inf-der del player) ── */
  function clickFSBtn(){
    try{
      document.querySelectorAll('.sh').forEach(s=>s.style.pointerEvents='none');
      const r = stream.getBoundingClientRect();
      const x = r.right  - 26;
      const y = r.bottom - 22;
      const ev = new MouseEvent('click',{bubbles:true,cancelable:true,clientX:x,clientY:y,view:window});
      (document.elementFromPoint(x,y)||stream).dispatchEvent(ev);
      setTimeout(()=>document.querySelectorAll('.sh').forEach(s=>s.style.pointerEvents='all'), 400);
    }catch(e){}
  }

  /* ── Detectar fullscreen ── */
  function onFS(){
    const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
    fab.classList.toggle('show', !inFS && launched);
    // En FS los ads del player quedan tapados por el video; fuera mostramos shields
    document.querySelectorAll('.sh').forEach(s=>s.style.display=inFS?'none':'');
  }
  document.addEventListener('fullscreenchange', onFS);
  document.addEventListener('webkitfullscreenchange', onFS);

  /* ── Bloquear window.open (popups) ── */
  window.open = (...a)=>{console.warn('[block]',a[0]);return null;};

  /* ── Eliminar nodos de ads inyectados en el padre ── */
  new MutationObserver(ms=>ms.forEach(m=>m.addedNodes.forEach(n=>{
    if(n.nodeType!==1)return;
    if(/ad|banner|popup|modal|promo|notify|overlay|adult/i.test((n.className||'')+(n.id||'')))
      n.remove();
  }))).observe(document.body,{childList:true,subtree:true});

})();
</script>
</body>
</html>
