<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNIVISION — Live</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Iframe oculto hasta que el usuario toca ── */
    #stream {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #stream.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ══════════════════════════════
       PANTALLA DE INICIO (tap-to-play)
    ══════════════════════════════ */
    #tap-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }
    #tap-screen.gone {
      opacity: 0;
      pointer-events: none;
    }

    /* Fondo animado */
    #tap-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #1a0a00 0%, #000 70%);
    }

    .logo-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* Ícono U de Univision */
    .u-icon {
      width: 90px; height: 90px;
      border-radius: 22px;
      background: linear-gradient(135deg, #e4142b 0%, #b00e22 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(228,20,43,0.45), 0 8px 32px rgba(0,0,0,0.6);
      margin-bottom: 8px;
      animation: pulse-glow 2.4s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(228,20,43,0.35), 0 8px 32px rgba(0,0,0,0.6); }
      50%       { box-shadow: 0 0 60px rgba(228,20,43,0.65), 0 8px 32px rgba(0,0,0,0.6); }
    }
    .u-icon svg { width: 48px; height: 48px; }

    .channel-title {
      color: #fff;
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .live-tag {
      display: flex; align-items: center; gap: 6px;
      color: #e4142b;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #e4142b;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Botón grande de play */
    .tap-btn {
      margin-top: 48px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.2s;
      backdrop-filter: blur(8px);
    }
    #tap-screen:active .tap-btn {
      transform: scale(0.92);
      background: rgba(255,255,255,0.16);
    }
    .tap-btn svg { width: 32px; height: 32px; margin-left: 5px; }

    .tap-hint {
      margin-top: 20px;
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      letter-spacing: 1px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ══════════════════════════════
       BLOQUEADORES DE ADS
       Cubren las zonas de anuncios
       (solo activos fuera de FS nativo)
    ══════════════════════════════ */
    .ad-shield {
      position: fixed;
      z-index: 10;
      background: transparent;
      pointer-events: all;
    }
    /* Banner VPN superior */
    #shield-top    { top:0; left:0; right:0; height:22%; }
    /* Popup regalo inferior centro */
    #shield-bottom { bottom:0; left:30%; right:30%; height:30%; }
    /* Badge rojo arriba-derecha */
    #shield-tr     { top:0; right:0; width:15%; height:15%; }

    /* ── Botón flotante de FS (por si se sale) ── */
    #fs-fab {
      position: fixed;
      bottom: 22px; right: 18px;
      z-index: 50;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    #fs-fab:hover { background: rgba(0,0,0,0.8); }
    #fs-fab.visible { display: flex; }

    /* Indicador de sonido ON */
    #sound-badge {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 50;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 20px;
      display: none;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(6px);
      letter-spacing: 0.5px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      animation: fadeIn 0.4s ease;
    }
    #sound-badge.visible { display: flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<!-- ══ IFRAME (cargado desde el inicio para no esperar) ══ -->
<iframe
  id="stream"
  src="https://telefullhd.net/canales/univision/"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen
  sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation"
  referrerpolicy="no-referrer"
></iframe>

<!-- ══ BLOQUEADORES DE ADS ══ -->
<div class="ad-shield" id="shield-top"></div>
<div class="ad-shield" id="shield-bottom"></div>
<div class="ad-shield" id="shield-tr"></div>

<!-- ══ FAB pantalla completa (visible fuera de FS) ══ -->
<div id="fs-fab" onclick="activarFullscreen()" title="Pantalla completa">⛶</div>

<!-- ══ Badge sonido ON ══ -->
<div id="sound-badge">🔊 Sonido activado</div>

<!-- ══ PANTALLA DE INICIO ══ -->
<div id="tap-screen" onclick="iniciarReproduccion()">
  <div class="logo-wrap">
    <div class="u-icon">
      <!-- Logo simplificado Univision -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 12 L10 30 Q10 42 24 42 Q38 42 38 30 L38 12 L30 12 L30 30 Q30 34 24 34 Q18 34 18 30 L18 12 Z" fill="white"/>
      </svg>
    </div>
    <span class="channel-title">Univision</span>
    <span class="live-tag"><span class="live-dot"></span>En vivo</span>
  </div>

  <div class="tap-btn">
    <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
  </div>
  <span class="tap-hint">Toca para ver en pantalla completa</span>
</div>

<script>
(function () {
  const stream    = document.getElementById('stream');
  const tapScreen = document.getElementById('tap-screen');
  const fsFab     = document.getElementById('fs-fab');
  const sndBadge  = document.getElementById('sound-badge');

  let fullscreenActivado = false;

  /* ══════════════════════════════════════════════
     INICIO: el usuario toca → FS + audio
  ══════════════════════════════════════════════ */
  window.iniciarReproduccion = function () {
    // 1. Mostrar iframe
    stream.classList.add('active');

    // 2. Ocultar pantalla de inicio
    tapScreen.classList.add('gone');

    // 3. Mostrar badge de sonido brevemente
    sndBadge.classList.add('visible');
    setTimeout(() => sndBadge.classList.remove('visible'), 3000);

    // 4. Entrar en pantalla completa
    //    Intentamos en orden: iframe → elemento raíz
    activarFullscreen();

    // 5. Después de entrar en FS, intentar hacer clic
    //    en el botón de FS interno del player (abajo-derecha del iframe)
    //    El timeout permite que el player arranque antes del clic
    setTimeout(clickPlayerFullscreen, 2200);
    setTimeout(clickPlayerFullscreen, 4000); // segundo intento
  };

  /* ══════════════════════════════════════════════
     PANTALLA COMPLETA
  ══════════════════════════════════════════════ */
  window.activarFullscreen = function () {
    const el = stream; // fullscreen sobre el iframe
    try {
      if (el.requestFullscreen)             el.requestFullscreen();
      else if (el.webkitRequestFullscreen)  el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen)      el.msRequestFullscreen();
      else {
        // Fallback: fullscreen sobre el documento completo
        const de = document.documentElement;
        (de.requestFullscreen || de.webkitRequestFullscreen).call(de);
      }
      fullscreenActivado = true;
    } catch (e) {
      console.warn('FS error:', e);
    }
  };

  /* ══════════════════════════════════════════════
     SIMULAR CLIC EN EL BOTÓN DE FS DEL PLAYER
     El botón de FS del player está en la esquina
     inferior-derecha del iframe. Lo calculamos
     y lo disparamos como MouseEvent.
     (Solo funciona si el iframe está en misma sesión
      y el player lo acepta via event delegation)
  ══════════════════════════════════════════════ */
  function clickPlayerFullscreen() {
    try {
      const rect = stream.getBoundingClientRect();
      // Coordenadas aprox del botón FS interno (abajo-derecha)
      const x = rect.right  - 24;
      const y = rect.bottom - 24;

      // Temporalmente ocultamos los shields para que el clic pase al iframe
      document.querySelectorAll('.ad-shield').forEach(s => s.style.pointerEvents = 'none');

      const ev = new MouseEvent('click', {
        bubbles: true, cancelable: true,
        clientX: x, clientY: y,
        view: window
      });
      // Intentamos sobre el iframe directamente
      stream.dispatchEvent(ev);

      // También intentamos vía postMessage (algunos players JW/HLS escuchan)
      stream.contentWindow.postMessage({ action: 'fullscreen' }, '*');
      stream.contentWindow.postMessage({ action: 'play'       }, '*');
      stream.contentWindow.postMessage('play', '*');

      setTimeout(() => {
        document.querySelectorAll('.ad-shield').forEach(s => s.style.pointerEvents = 'all');
      }, 300);
    } catch (e) {}
  }

  /* ══════════════════════════════════════════════
     DETECTAR CAMBIOS EN FULLSCREEN
     Si el usuario sale del FS → mostrar FAB
  ══════════════════════════════════════════════ */
  function onFsChange() {
    const enFS = !!(
      document.fullscreenElement ||
      document.webkitFullscreenElement ||
      document.msFullscreenElement
    );
    fsFab.classList.toggle('visible', !enFS && fullscreenActivado);

    // Si salió de FS, ocultar shields (el player los cubre en FS)
    document.querySelectorAll('.ad-shield').forEach(s => {
      s.style.display = enFS ? 'none' : '';
    });
  }
  document.addEventListener('fullscreenchange',       onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  /* ══════════════════════════════════════════════
     BLOQUEAR POPUPS DEL IFRAME (window.open)
  ══════════════════════════════════════════════ */
  window.open = function (...args) {
    console.warn('[Shield] Popup bloqueado:', args[0]);
    return null;
  };

  /* ══════════════════════════════════════════════
     OBSERVER: elimina nodos de ads inyectados
     en el DOM del padre
  ══════════════════════════════════════════════ */
  new MutationObserver(mutations => {
    mutations.forEach(m => m.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      const tag = (node.className || '') + (node.id || '');
      if (/ad|banner|popup|modal|promo|notify|overlay/i.test(tag)) node.remove();
    }));
  }).observe(document.body, { childList: true, subtree: true });

})();
</script>

</body>
</html>
