<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIVISION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .video-container {
            position: relative; 
            width: 100%; 
            height: 100%;
        }

        iframe { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            border: none; 
        }

        /* EL PARCHE VISUAL: Oculta la basura visual */
        .parche-visual {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Cubre todo el alto, excepto los últimos 55px donde están los controles */
            height: calc(100% - 55px); 
            background-color: #000; /* Negro sólido */
            z-index: 10; /* Se pone por encima del iframe */
            
            /* Diseño del mensaje */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            
            /* Atrapa los clics para que el usuario no pueda tocar el anuncio por accidente */
            pointer-events: auto; 
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://telefullhd.net/canales/univision/" 
            allow="autoplay; fullscreen; encrypted-media" 
            allowfullscreen 
            sandbox="allow-scripts allow-same-origin">
        </iframe>
        
        <div class="parche-visual" id="parche">
            Toca el cuadro de pantalla completa abajo ↘️
        </div>
    </div>

    <script>
        // Opcional: Ocultar el parche automáticamente DESPUÉS de que el usuario entre a pantalla completa
        // para que si decide salir de la pantalla completa, ya no esté el bloque negro estorbando.
        document.addEventListener('fullscreenchange', function() {
            if (document.fullscreenElement) {
                document.getElementById('parche').style.display = 'none';
            }
        });
        document.addEventListener('webkitfullscreenchange', function() {
            if (document.webkitFullscreenElement) {
                document.getElementById('parche').style.display = 'none';
            }
        });
    </script>
</body>
</html>
