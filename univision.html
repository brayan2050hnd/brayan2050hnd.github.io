<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIVISION</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

#stream{
  position:fixed;inset:0;
  width:100%;height:100%;
  border:none;display:block;
}

/* Shields — tapan las zonas de anuncios */
.sh{position:fixed;z-index:9;background:transparent;pointer-events:all}
#sh-top {top:0;left:0;right:0;height:25%}
#sh-bot {bottom:0;left:20%;right:20%;height:28%}
#sh-tr  {top:0;right:0;width:14%;height:14%}
#sh-tl  {top:0;left:0;width:14%;height:14%}
</style>
</head>
<body>

<iframe id="stream"
  src="https://telefullhd.net/canales/univision/"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen
  sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation"
  referrerpolicy="no-referrer"
></iframe>

<div class="sh" id="sh-top"></div>
<div class="sh" id="sh-bot"></div>
<div class="sh" id="sh-tr"></div>
<div class="sh" id="sh-tl"></div>

<script>
function goFS(){
  var el = document.documentElement;
  try{
    (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen).call(el);
  }catch(e){}
}

goFS();

document.getElementById('stream').addEventListener('load', function(){
  goFS();
  var iframe = this;
  setTimeout(function(){
    var r = iframe.getBoundingClientRect();
    document.querySelectorAll('.sh').forEach(function(s){s.style.pointerEvents='none'});
    var ev = new MouseEvent('click',{bubbles:true,cancelable:true,
      clientX:r.right-24, clientY:r.bottom-22, view:window});
    (document.elementFromPoint(r.right-24,r.bottom-22)||iframe).dispatchEvent(ev);
    setTimeout(function(){
      document.querySelectorAll('.sh').forEach(function(s){s.style.pointerEvents='all'});
    },400);
  },1500);
});

window.open = function(){ return null; };

new MutationObserver(function(ms){
  ms.forEach(function(m){
    m.addedNodes.forEach(function(n){
      if(n.nodeType!==1)return;
      if(/ad|banner|popup|modal|promo|notify|overlay/i.test((n.className||'')+(n.id||'')))
        n.remove();
    });
  });
}).observe(document.body,{childList:true,subtree:true});
</script>
</body>
</html>
